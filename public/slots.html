<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Слоти - НТУУ КазиноПІ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="player-hud" class="player-hud">
        <div class="hud-info">
            <span id="hud-username" class="hud-username">Гравець</span>
            <span class="hud-balance"><span id="hud-balance-val">0</span> 💸</span>
        </div>
        <button id="logout-btn" class="hud-logout">Вийти</button>
    </div>

    <a href="index.html" class="back-to-lobby-btn">⬅ В ЛОБІ</a>

    <div class="casino-container">
        <div class="character-panel">
            <img src="img/anime.png" id="character-image" alt="Anime Character">
            <div id="character-dialogue">"Готовий зробити ставку, семпай?"</div>
        </div>

        <div class="game-panel bj-full-panel" style="width: 60% !important; padding: 30px !important;">
            
            <div class="bj-row-header" style="margin-bottom: 30px;">
                <h2 class="bj-text-title">СЛОТИ</h2>
                <div class="bj-text-balance">БАЛАНС: <span id="balance">...</span> 💸</div>
            </div>

            <div class="bj-dep-block" style="margin-bottom: 30px;">
                <button id="deposit-btn" class="quick-btn bj-dep-btn">Хочу додеп</button>
            </div>

            <div class="slot-machine" style="margin-bottom: 30px;">
                <div class="slot" id="slot1">❓</div>
                <div class="slot" id="slot2">❓</div>
                <div class="slot" id="slot3">❓</div>
            </div>

            <div class="bj-controls-area">
                <div class="quick-bets">
                    <button class="quick-btn bj-quick-bet" data-amount="25">+25</button>
                    <button class="quick-btn bj-quick-bet" data-amount="50">+50</button>
                    <button class="quick-btn bj-quick-bet" data-amount="75">+75</button>
                    <button class="quick-btn bj-quick-bet" data-amount="100">+100</button>
                </div>

                <div class="bj-input-group">
                    <input type="number" id="bet-amount" class="bj-input" value="100">
                    <button id="spin-btn" class="bj-btn">КРУТИТИ</button>
                </div>
                <div id="message" class="message">Зроби свою першу ставку!</div>
            </div>

        </div>
    </div>

    <script src="js/slots.js"></script>
</body>
</html>
