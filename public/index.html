<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casino-container">
        <div class="character-panel">
            <img id="character-image" src="anime.png" alt="Аніме персонаж">
            <p id="character-dialogue">"Готовий зробити ставку, семпай?"</p>
        </div>

        <div class="game-panel">
            <header>
                <h2>НТУУ КазиноПІ</h2>
                <div class="balance-container">
                    <span class="balance-text">Баланс: <span id="balance">...</span></span>
                    <button id="deposit-btn" class="deposit-btn">Хочу додеп</button>
                </div>
            </header>

            <div class="slot-machine">
                <div class="slot" id="slot1">❓</div>
                <div class="slot" id="slot2">❓</div>
                <div class="slot" id="slot3">❓</div>
            </div>

            <div class="controls-wrapper">
                <div class="quick-bets">
                    <button class="quick-btn" data-add="25">+25</button>
                    <button class="quick-btn" data-add="50">+50</button>
                    <button class="quick-btn" data-add="75">+75</button>
                    <button class="quick-btn" data-add="100">+100</button>
                </div>
                <div class="controls">
                    <input type="number" id="bet-amount" value="100" min="1" placeholder="Ставка">
                    <button id="spin-btn">Крутити</button>
                </div>
            </div>
            
            <div id="message" class="message">Зроби свою першу ставку!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
