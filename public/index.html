<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Головна сторінка</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="player-hud" class="player-hud" style="display: none;">
        <div class="hud-info">
            <span id="hud-username" class="hud-username">Гравець</span>
            <span class="hud-balance"><span id="hud-balance-val">0</span> 💸</span>
        </div>
        <button id="logout-btn" class="hud-logout">Вийти</button>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');
            const balance = localStorage.getItem('balance');

            if (token && username) {
                document.getElementById('player-hud').style.display = 'flex';
                document.getElementById('hud-username').textContent = username;
                document.getElementById('hud-balance-val').textContent = balance || '1000';
            }

            document.getElementById('logout-btn')?.addEventListener('click', () => {
                localStorage.clear();
                window.location.reload();
            });
        });
    </script>

    <div class="lobby-menu">
        <h1 class="lobby-title">Обери свою гру</h1>
        <div class="game-cards">
            <a href="slots.html" class="game-card">
                <div class="game-icon">🎰</div>
                <h2>Неонові Слоти</h2>
                <p>Випробуй свою удачу та зірви джекпот!</p>
            </a>
            
            <a href="blackjack.html" class="game-card">
                <div class="game-icon">🃏</div>
                <h2>Блекджек</h2>
                <p>Миттєва гра проти дилера!</p>
            </a>
        </div>
        <div class="leaderboard-section">
            <h2 class="lobby-title" style="font-size: 2rem; margin-top: 50px;">Топ-10 Багатіїв</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Місце</th>
                        <th>Гравець</th>
                        <th>Баланс</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="3" style="text-align: center;">Завантаження...</td></tr>
                </tbody>
            </table>
            <a href="/api/export" class="hud-logout" style="display: block; width: max-content; margin: 20px auto; text-align: center; text-decoration: none; padding: 12px 24px;">
                Завантажити CSV (Stream)
            </a>
        </div>
    </div>
    <script src="js/lobby.js"></script>
</body>
</html>
